<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#6FB3A0" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <style>
      .wall{fill:none;stroke:#6FB3A0;stroke-width:5;stroke-linejoin:round}
      .room{fill:#6FB3A0;fill-opacity:0.05;stroke:#6FB3A0;stroke-opacity:0.45;stroke-width:2}
      .lbl{fill:#F5F0E6;font-size:20px;letter-spacing:0.06em}
      .sub{fill:#9FC9BC;font-size:12px;letter-spacing:0.08em}
      .leg{fill:#C9C3B5;font-size:13px}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#0e1a16"/>
  <rect x="0" y="0" width="960" height="600" fill="url(#grid2)"/>

  <text x="40" y="44" class="lbl" font-size="24" fill="#C9A84C" letter-spacing="0.12em">UPPER GALLERY</text>
  <text x="40" y="64" class="sub">Beneath the Dome &#183; The Display</text>

  <!-- octagonal gallery under the dome -->
  <polygon points="300,110 660,110 800,250 800,470 660,540 300,540 160,470 160,250"
           class="room"/>
  <polygon points="300,110 660,110 800,250 800,470 660,540 300,540 160,470 160,250"
           class="wall"/>

  <!-- domed skylight (dashed ring) -->
  <circle cx="480" cy="325" r="200" fill="none" stroke="#9FC9BC" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="480" y="135" class="sub" text-anchor="middle" fill="#9FC9BC">DOMED SKYLIGHT (entry / exit)</text>

  <!-- ring of display cases -->
  <g fill="#6FB3A0" fill-opacity="0.12" stroke="#6FB3A0" stroke-opacity="0.5" stroke-width="2">
    <rect x="250" y="200" width="60" height="34"/><rect x="650" y="200" width="60" height="34"/>
    <rect x="250" y="420" width="60" height="34"/><rect x="650" y="420" width="60" height="34"/>
    <rect x="450" y="160" width="60" height="34"/><rect x="450" y="490" width="60" height="34"/>
  </g>
  <text x="225" y="270" class="leg" text-anchor="middle" transform="rotate(-90 225 270)">Curiosity cases</text>

  <!-- the Malevolence, center -->
  <circle cx="480" cy="325" r="95" fill="url(#pulse)"/>
  <rect x="438" y="283" width="84" height="84" rx="6" fill="#14110d" stroke="#C9A84C" stroke-width="2.5"/>
  <g transform="translate(480,325)">
    <circle r="22" fill="#1b1712" stroke="#C9A84C" stroke-width="1.5"/>
    <path d="M-10 -8 L4 -12 L12 2 L2 14 L-12 8 Z" fill="#2a2418" stroke="#7a6a3a" stroke-width="1"/>
  </g>
  <text x="480" y="395" class="lbl" font-size="17" text-anchor="middle" fill="#E7D79B">The Malevolence</text>
  <text x="480" y="414" class="sub" text-anchor="middle" fill="#C9A84C">Case wired to the alarm</text>

  <!-- stair landing from below -->
  <rect x="380" y="500" width="90" height="40" fill="#6FB3A0" fill-opacity="0.08" stroke="#6FB3A0" stroke-opacity="0.5" stroke-width="2"/>
  <g stroke="#6FB3A0" stroke-opacity="0.5" stroke-width="2">
    <line x1="388" y1="510" x2="462" y2="510"/><line x1="388" y1="522" x2="462" y2="522"/><line x1="388" y1="534" x2="462" y2="534"/>
  </g>
  <text x="425" y="492" class="leg" text-anchor="middle" fill="#9FC9BC">&#8595; Ground floor</text>

  <text x="70" y="588" class="leg" fill="#7C9A8F">Squares ≈ 5 ft &#183; the skylight drops the crew almost on the prize</text>
</svg>
