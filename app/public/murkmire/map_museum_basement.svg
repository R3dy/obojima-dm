<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#6FB3A0" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>
    <pattern id="water" width="28" height="14" patternUnits="userSpaceOnUse">
      <path d="M0 7 q7 -7 14 0 q7 7 14 0" fill="none" stroke="#6B7FA0" stroke-opacity="0.35" stroke-width="1.5"/>
    </pattern>
    <style>
      .wall{fill:none;stroke:#6FB3A0;stroke-width:5;stroke-linejoin:round}
      .room{fill:#6FB3A0;fill-opacity:0.05;stroke:#6FB3A0;stroke-opacity:0.45;stroke-width:2}
      .lbl{fill:#F5F0E6;font-size:20px;letter-spacing:0.06em}
      .sub{fill:#9FC9BC;font-size:12px;letter-spacing:0.08em}
      .leg{fill:#C9C3B5;font-size:13px}
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#0e1a16"/>
  <rect x="0" y="0" width="960" height="600" fill="url(#grid3)"/>

  <text x="40" y="44" class="lbl" font-size="24" fill="#C9A84C" letter-spacing="0.12em">SUB-BASEMENT</text>
  <text x="40" y="64" class="sub">Service Tunnel &#183; Specimen Storeroom</text>

  <!-- footprint -->
  <rect x="70" y="90" width="820" height="460" class="wall"/>

  <!-- flooded service tunnel from river (left) -->
  <rect x="78" y="300" width="360" height="120" class="room"/>
  <rect x="78" y="300" width="360" height="120" fill="url(#water)"/>
  <text x="100" y="290" class="lbl" font-size="17">Flooded Service Tunnel</text>
  <text x="100" y="450" class="sub" fill="#A8B6CC">Knee-deep, cold, dark</text>

  <!-- culvert grate (river entry) -->
  <g transform="translate(70,360)">
    <rect x="-14" y="-26" width="14" height="52" fill="#6B7FA0" fill-opacity="0.25" stroke="#6B7FA0" stroke-width="2"/>
    <line x1="-14" y1="-14" x2="0" y2="-14" stroke="#6B7FA0" stroke-width="2"/>
    <line x1="-14" y1="0" x2="0" y2="0" stroke="#6B7FA0" stroke-width="2"/>
    <line x1="-14" y1="14" x2="0" y2="14" stroke="#6B7FA0" stroke-width="2"/>
  </g>
  <text x="40" y="440" class="leg" fill="#A8B6CC">Culvert grate</text>
  <text x="40" y="456" class="leg" fill="#A8B6CC">(river entry)</text>

  <!-- Specimen Storeroom -->
  <rect x="470" y="98" width="412" height="300" class="room" fill="#8B3A3A" fill-opacity="0.06" stroke="#C47171" stroke-opacity="0.45"/>
  <text x="492" y="132" class="lbl">Specimen Storeroom</text>
  <text x="492" y="152" class="sub" fill="#E8B4B4">Necrotic field strongest here</text>
  <!-- shelves -->
  <g fill="#C47171" fill-opacity="0.10" stroke="#C47171" stroke-opacity="0.4" stroke-width="2">
    <rect x="500" y="180" width="350" height="20"/><rect x="500" y="220" width="350" height="20"/>
    <rect x="500" y="260" width="350" height="20"/><rect x="500" y="300" width="350" height="20"/>
    <rect x="500" y="340" width="350" height="20"/>
  </g>
  <!-- swarm marker -->
  <g transform="translate(680,270)" fill="#C47171" fill-opacity="0.55">
    <circle cx="-10" cy="-6" r="4"/><circle cx="2" cy="-9" r="4"/><circle cx="11" cy="-2" r="4"/>
    <circle cx="-4" cy="5" r="4"/><circle cx="7" cy="8" r="4"/><circle cx="-13" cy="6" r="4"/>
  </g>
  <text x="680" y="378" class="leg" text-anchor="middle" fill="#E8B4B4">Specimen-jar swarm</text>

  <!-- back stair up -->
  <rect x="470" y="430" width="120" height="110" class="room"/>
  <g stroke="#6FB3A0" stroke-opacity="0.5" stroke-width="2">
    <line x1="478" y1="450" x2="582" y2="450"/><line x1="478" y1="470" x2="582" y2="470"/>
    <line x1="478" y1="490" x2="582" y2="490"/><line x1="478" y1="510" x2="582" y2="510"/>
  </g>
  <text x="530" y="535" class="sub" text-anchor="middle" fill="#9FC9BC">Stair</text>
  <text x="530" y="420" class="leg" text-anchor="middle" fill="#9FC9BC">&#8593; Ground floor</text>

  <!-- doors -->
  <line x1="438" y1="345" x2="470" y2="345" stroke="#0e1a16" stroke-width="6"/>
  <line x1="470" y1="200" x2="470" y2="235" stroke="#0e1a16" stroke-width="6"/>

  <text x="70" y="588" class="leg" fill="#7C9A8F">Squares ≈ 5 ft &#183; unguarded, but the dead stir down here</text>
</svg>
